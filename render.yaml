# Archivo de configuracion automatica para Render.com
# Este archivo NO afecta en absoluto el funcionamiento local de tu proyecto
# Render lo detecta automaticamente cuando conectas el repositorio

databases:
  - name: almacenq24-db
    plan: free
    databaseName: almacenq24
    user: almacenq24_user
    postgresMajorVersion: 16

services:
  - type: web
    name: almacenq24-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && cd ../frontend && npm install && npm run build
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Argentina/Buenos_Aires
      - key: DATABASE_URL
        fromDatabase:
          name: almacenq24-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
        
    autoDeploy: true
    pullRequestPreviewsEnabled: false