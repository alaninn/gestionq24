# Archivo de configuracion automatica para Render.com
# Este archivo NO afecta en absoluto el funcionamiento local de tu proyecto
# Render lo detecta automaticamente cuando conectas el repositorio

databases:
  - name: almacenq24-db
    plan: free
    databaseName: almacenq24
    user: almacenq24_user
    postgresMajorVersion: 16

services:
  - type: web
    name: gestionq24
    runtime: node
    plan: free
    buildCommand: |
      echo "🔨 Iniciando build..."
      cd backend
      npm ci --no-fund --no-audit
      cd ../frontend
      rm -rf node_modules package-lock.json .vite dist
      npm install vite @vitejs/plugin-react --no-save
      npm install --no-fund --no-audit --no-bin-links --force
      node ./node_modules/vite/bin/vite.js build --outDir dist
      ls -la dist
      echo "✅ Build finalizado correctamente"
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Argentina/Buenos_Aires
      - key: DATABASE_URL
        fromDatabase:
          name: almacenq24-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
        
    autoDeploy: true
    pullRequestPreviewsEnabled: false